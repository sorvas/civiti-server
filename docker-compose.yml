services:
  postgres:
    image: postgres:16-alpine
    container_name: civica-db
    environment:
      POSTGRES_USER: civica
      POSTGRES_PASSWORD: civica123
      POSTGRES_DB: civica_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U civica -d civica_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: